name: Voice call image

on:
  push:
    branches: [main, feature/voice-calls]
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: voice-call-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'schedule' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Merge current upstream
        if: github.event_name == 'schedule'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote add upstream https://github.com/mautrix/whatsapp.git
          git fetch upstream main
          git merge --no-edit upstream/main
          git push origin HEAD:main

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install native libraries
        run: sudo apt-get update && sudo apt-get install -y libolm-dev libopus-dev libopusfile-dev

      - name: Test
        run: go test ./...

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/giacomo213342/mautrix-whatsapp:voice-calls
            ghcr.io/giacomo213342/mautrix-whatsapp:voice-calls-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
